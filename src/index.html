<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ST3 Pro Tuning | Schneller Fahren</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Outfit:wght@500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-glow"></div>

    <main class="app-container">
        <!-- Header -->
        <header>
            <h1 class="brand-title">ST3 PRO <span>TUNING</span></h1>
            <div class="status-pill" id="connectionStatus">
                <span class="dot"></span>
                <span class="text">Disconnected</span>
            </div>
        </header>

        <!-- Tab 1: Dashboard -->
        <section id="tab-dashboard" class="tab-content active" style="padding: 0; background: transparent; border: none; box-shadow: none; backdrop-filter: none;">
            
            <!-- Scooter Info Card -->
            <div class="info-card">
                <div class="info-row"><span class="info-label">STATUS</span><span class="info-value status-modified" id="scooterStatus">Original</span></div>
                <div class="info-row"><span class="info-label">SERIAL</span><span class="info-value" id="scooterSerial">--</span></div>
                <div class="info-row"><span class="info-label">METER</span><span class="info-value" id="scooterMeter">--</span></div>
                <div class="info-row"><span class="info-label">BLDC</span><span class="info-value" id="scooterBldc">--</span></div>
                <div class="info-row"><span class="info-label">BMS</span><span class="info-value" id="scooterBms">--</span></div>
            </div>

            <!-- Action Card -->
            <div class="action-card" id="actionCard">
                <div class="card-header">
                    <span class="icon">⚙️</span> Flash Firmware
                </div>
                
                <button id="connectBtn" class="btn btn-blue" style="margin-bottom: 15px;">Connect Scooter</button>
                
                <div class="progress-section hidden" id="flashUI">
                    <div class="progress-label" id="flashLabel">Flashing BLDC (1/1)</div>
                    <div class="progress-bar-bg">
                        <div class="progress-bar-fill" id="flashFill" style="width: 0%"></div>
                    </div>
                    <div class="progress-percentage" id="flashPercent">0%</div>
                    <button id="cancelFlashBtn" class="btn btn-red" style="margin-top: 20px;">Cancel</button>
                </div>
                
                <button id="bleBypassBtn" class="btn btn-blue hidden" style="margin-top: 15px;">Inject Speed Unlock</button>
            </div>
            
            <!-- Debug Console -->
            <section id="debugConsole" style="background: rgba(0,0,0,0.8); color: #0f0; font-family: monospace; font-size: 10px; padding: 10px; margin-top: 20px; height: 100px; overflow-y: auto; border: 1px solid #0f0; border-radius: 8px;">
                <div>--- SYSTEM LOG ---</div>
            </section>
        </section>

        <!-- Tab 2: Tuning -->
        <section id="tab-tuning" class="glass-panel tab-content" style="display: none;">
            <div class="tuning-controls" id="controlsSectionTuning">
                <div class="control-group">
                    <div class="control-header"><label>Region</label></div>
                    <select id="regionSelect" class="neon-select">
                        <option value="0x00">Custom (Unrestricted)</option>
                        <option value="0x01">Global (32 km/h)</option>
                        <option value="0x02" selected>EU (20 km/h)</option>
                        <option value="0x03">DE (20 km/h ABE)</option>
                    </select>
                </div>
                <div class="control-group">
                    <div class="control-header"><label>Speed Limit</label><span id="speedValue" class="value-display">20 km/h</span></div>
                    <input type="range" id="speedSlider" min="5" max="40" value="20" class="neon-slider">
                </div>
                <div class="control-group">
                    <div class="control-header"><label>KERS Level</label><span id="kersValue" class="value-display">Medium</span></div>
                    <input type="range" id="kersSlider" min="0" max="3" value="2" class="neon-slider">
                </div>
                <div class="control-group">
                    <div class="control-header"><label>Push-to-Start Speed</label><span id="startupValue" class="value-display">5 km/h</span></div>
                    <input type="range" id="startupSlider" min="0" max="5" value="5" class="neon-slider">
                </div>
                <div class="control-group" style="margin-bottom:0;">
                    <div class="control-header"><label>Motor Torque Limit</label><span id="torqueValue" class="value-display">25 A</span></div>
                    <input type="range" id="torqueSlider" min="15" max="32" value="25" class="neon-slider">
                </div>
            </div>
        </section>

        <!-- Tab 3: Advanced -->
        <section id="tab-advanced" class="glass-panel tab-content" style="display: none;">
            <div class="tuning-controls" id="controlsSectionAdvanced">
                <div class="toggle-group">
                    <label>Cruise Control</label>
                    <label class="switch"><input type="checkbox" id="cruiseToggle"><span class="slider round"></span></label>
                </div>
                <div class="toggle-group">
                    <label>Side LEDs</label>
                    <label class="switch"><input type="checkbox" id="ledToggle"><span class="slider round led-slider"></span></label>
                </div>
                <button id="bypassBtn" class="btn danger bypass-btn" style="margin-bottom: 15px;">Force Override (Bypass Firmware)</button>
                <button id="applyBtn" class="btn primary apply-btn">Flash Firmware</button>
                <div class="progress-container hidden" id="flashProgressContainer">
                    <p id="flashStatusText">Initializing...</p>
                    <div class="progress-bar"><div class="progress-fill" id="flashProgressFill"></div></div>
                </div>
            </div>
        </section>
        
        <!-- Bottom Tab Bar -->
        <nav class="bottom-tab-bar">
            <button class="tab-btn active" data-target="tab-dashboard">Dashboard</button>
            <button class="tab-btn" data-target="tab-tuning">Tuning</button>
            <button class="tab-btn" data-target="tab-advanced">Advanced</button>
        </nav>
    </main>

    <!-- Custom iOS Scanner Modal -->
    <div id="customScanner" class="glass-panel hidden" style="position: absolute; z-index: 1000; top: 5%; left: 5%; width: 90%; height: 90%; overflow-y: auto; background: rgba(5,5,7,0.95); border: 2px solid var(--accent); padding-bottom: 20px;">
        <h2 style="color: var(--accent); margin-bottom: 15px; font-family: 'Outfit', sans-serif;">Scanning for Devices...</h2>
        <div id="deviceList" style="display:flex; flex-direction:column; gap:10px; margin-bottom: 20px;"></div>
        <button id="cancelScanBtn" class="btn danger">Cancel Scan</button>
    </div>

    <!-- Dependencies -->
    <script src="protocol.js"></script>
    <script src="cap-ble.js"></script>
    <script src="app.js"></script>
</body>
</html>
